name: Download Trackers

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install fake-useragent python-dotenv

      - name: Run download script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/download_trackers.py

      - name: Commit and push
        run: |
          git config --local user.email "${{ vars.GIT_USER_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git config --local user.name "${{ vars.GIT_USER_NAME || 'github-actions[bot]' }}"
          git add -A
          if git diff --staged --stat | grep -q .; then
            git commit -m "Update trackers $(date -u +'%Y-%m-%d')"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          else
            echo "No changes to push"
          fi